<!DOCTYPE html>
<html lang="en-us">

<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@latest/ultrakill/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | ULTRAKILL</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <div id='loading-text' style="color: black; font-family: cursive; font-size: 48px; text-align: center; margin-top: 20px;">LOADING...</div>
    <canvas id="unity-canvas" tabindex="-1" hidden></canvas>
    <script src="Build/ultrakill.loader.js"></script>
    <script>
        var canvas = document.querySelector("#unity-canvas");
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            // Mobile device style: fill the whole browser client area with the game canvas:
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            canvas.style.position = "fixed";
            document.body.style.textAlign = "left";
        } else {
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        let mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }
                    fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }
        Promise.all([
            mergeFiles(getParts("Build/ultrakill.data.unityweb", 1, 4)),
            mergeFiles(getParts("Build/ultrakill.wasm.unityweb", 1, 2))
        ]).then(([dataUrl, wasmurl]) => {
            document.querySelector("#unity-canvas").hidden = false;
            createUnityInstance(document.querySelector("#unity-canvas"), {
                dataUrl: dataUrl,
                frameworkUrl: "Build/ultrakill.framework.js.unityweb",
                codeUrl: wasmurl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Hakita and Cake Logic",
                productName: "ULTRAKILL",
                productVersion: "1.4",
                // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
                // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
            }).then((e) => {
                document.querySelector("#loading-text").remove();
            });
        });
    </script>

<!-- MOBILE CONTROLS START -->
<style>
#mobile-controls {
  position: fixed;
  inset: 0;
  pointer-events: none;
}
#joystick, #camstick {
  position: absolute;
  width: 22vw;
  height: 22vw;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  pointer-events: auto;
  touch-action: none;
}
#joystick { bottom: 10%; left: 8%; }
#camstick { bottom: 10%; right: 8%; }

.btn {
  position: absolute;
  width: 14vw;
  height: 14vw;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  font-size: 3vw;
  pointer-events: auto;
}
#jump { bottom: 30%; right: 20%; }
#dash { bottom: 45%; right: 10%; }
#shoot { bottom: 15%; right: 25%; }
#alt { bottom: 30%; right: 35%; }
</style>

<div id="mobile-controls">
  <div id="joystick"></div>
  <div id="camstick"></div>

  <button class="btn" id="jump">J</button>
  <button class="btn" id="dash">D</button>
  <button class="btn" id="shoot">●</button>
  <button class="btn" id="alt">◎</button>
</div>

<script>
function pressKey(key) {
  document.dispatchEvent(new KeyboardEvent('keydown', { key }));
}
function releaseKey(key) {
  document.dispatchEvent(new KeyboardEvent('keyup', { key }));
}

function bindButton(id, key) {
  const el = document.getElementById(id);
  el.addEventListener("touchstart", e => { e.preventDefault(); pressKey(key); });
  el.addEventListener("touchend", e => { e.preventDefault(); releaseKey(key); });
}

bindButton("jump", " ");
bindButton("dash", "Shift");

// joystick movement
const joy = document.getElementById("joystick");
let active = false, sx=0, sy=0;

joy.addEventListener("touchstart", e=>{
  active=true;
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

joy.addEventListener("touchmove", e=>{
  if(!active) return;
  let dx=e.touches[0].clientX - sx;
  let dy=e.touches[0].clientY - sy;

  if(dx>20) pressKey("d"); else releaseKey("d");
  if(dx<-20) pressKey("a"); else releaseKey("a");
  if(dy>20) pressKey("s"); else releaseKey("s");
  if(dy<-20) pressKey("w"); else releaseKey("w");
});

joy.addEventListener("touchend", ()=>{
  active=false;
  ["w","a","s","d"].forEach(releaseKey);
});

// camera joystick (mouse move)
const cam = document.getElementById("camstick");
let camActive=false, cx=0, cy=0;

cam.addEventListener("touchstart", e=>{
  camActive=true;
  cx=e.touches[0].clientX;
  cy=e.touches[0].clientY;
});

cam.addEventListener("touchmove", e=>{
  if(!camActive) return;
  let dx=e.touches[0].clientX - cx;
  let dy=e.touches[0].clientY - cy;

  cx=e.touches[0].clientX;
  cy=e.touches[0].clientY;

  document.dispatchEvent(new MouseEvent("mousemove", {
    movementX: dx,
    movementY: dy
  }));
});

cam.addEventListener("touchend", ()=> camActive=false);

// shooting (tap anywhere right side)
document.getElementById("shoot").addEventListener("touchstart", ()=>{
  document.dispatchEvent(new MouseEvent("mousedown", {button:0}));
});
document.getElementById("shoot").addEventListener("touchend", ()=>{
  document.dispatchEvent(new MouseEvent("mouseup", {button:0}));
});

document.getElementById("alt").addEventListener("touchstart", ()=>{
  document.dispatchEvent(new MouseEvent("mousedown", {button:2}));
});
document.getElementById("alt").addEventListener("touchend", ()=>{
  document.dispatchEvent(new MouseEvent("mouseup", {button:2}));
});
</script>
<!-- MOBILE CONTROLS END -->

</body>

</html>
